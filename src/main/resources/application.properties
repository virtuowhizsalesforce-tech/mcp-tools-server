server.port=8080
spring.application.name=MCP

# MCP CORE
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.webmvc.enabled=true
spring.ai.mcp.server.base-path=/mcp

# 🔥 VERY IMPORTANT FIX
spring.ai.mcp.server.transport=webmvc

# REQUIRED FOR SALESFORCE HANDSHAKE
spring.ai.mcp.server.name=Salesforce-MCP-Server

# DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.org.springframework.web=DEBUG

# Salesforce creds
CLIENT_ID=dummy
CLIENT_SECRET=dummy
SF_USERNAME=dummy
PASSWORD_AND_TOKEN=dummy